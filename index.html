<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语音输入法 - 智能语音转文字</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎤 语音输入法</h1>
            <p class="subtitle">智能语音转文字工具</p>
        </header>

        <main>
            <div class="control-panel">
                <button id="startBtn" class="btn btn-start">
                    <span class="icon">🎤</span>
                    <span class="text">开始录音</span>
                </button>
                <button id="stopBtn" class="btn btn-stop" disabled>
                    <span class="icon">⏹️</span>
                    <span class="text">停止录音</span>
                </button>
            </div>

            <div class="status-panel">
                <div id="status" class="status">准备就绪</div>
                <div id="recordingIndicator" class="recording-indicator hidden">
                    <span class="pulse"></span>
                    <span>正在录音...</span>
                </div>
            </div>

            <div class="language-select">
                <label for="language">识别语言：</label>
                <select id="language">
                    <option value="zh-CN">中文（普通话）</option>
                    <option value="en-US">English (US)</option>
                    <option value="zh-TW">中文（繁体）</option>
                    <option value="ja-JP">日本語</option>
                </select>
            </div>

            <div class="output-panel">
                <div class="output-header">
                    <h2>识别结果</h2>
                    <div class="output-actions">
                        <button id="copyBtn" class="btn-action" title="复制文本">
                            📋 复制
                        </button>
                        <button id="clearBtn" class="btn-action" title="清空文本">
                            🗑️ 清空
                        </button>
                    </div>
                </div>
                <div id="output" class="output-area" contenteditable="true" placeholder="识别的文字将显示在这里..."></div>
            </div>

            <div class="info-panel">
                <h3>使用说明</h3>
                <ul>
                    <li>点击"开始录音"按钮，授权麦克风权限</li>
                    <li>开始说话，文字将实时显示在上方区域</li>
                    <li>点击"停止录音"结束语音输入</li>
                    <li>可以直接编辑识别结果，或复制到其他地方</li>
                    <li>支持中英文等多种语言识别</li>
                </ul>
                <div class="browser-support">
                    <strong>浏览器支持：</strong>
                    <span class="supported">Chrome ✅</span>
                    <span class="supported">Edge ✅</span>
                    <span class="partial">Firefox ⚠️</span>
                    <span class="unsupported">Safari ❌</span>
                </div>
            </div>
        </main>

        <footer>
            <p>基于 Web Speech API 构建 | 需在 HTTPS 或 localhost 环境下使用</p>
        </footer>
    </div>

    <script src="js/speech.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
